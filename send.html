<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Photophone · Send</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="page page--send">
      <header class="page__header">
        <a href="/" class="back">← back</a>
        <h1>Send</h1>
      </header>
      <section class="controls">
        <label class="file-picker">
          <input type="file" id="payload-input" accept="image/png" />
          <span>Choose a PNG to transmit</span>
        </label>
        <button id="start-button" disabled>Render first frame</button>
        <button id="stream-button" disabled>Start streaming</button>
        <span id="status" class="status">idle</span>
      </section>
      <section class="stage">
        <canvas id="frame-canvas"></canvas>
      </section>
      <section class="back-channel">
        <h2>Audio back-channel</h2>
        <p class="tagline">Listen for FSK messages from the receiver while
          streaming. Microphone permission required.</p>
        <div class="controls">
          <button id="bc-start">Listen for back-channel</button>
          <span id="bc-status" class="status">back-channel idle</span>
        </div>
        <div class="output">
          <pre id="bc-log">No back-channel messages yet.</pre>
        </div>
      </section>
    </main>
    <script type="module" src="/src/pages/send.ts"></script>
  </body>
</html>
