<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Photophone · Broadcast send</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="page page--send">
      <header class="page__header">
        <a href="/" class="back">← back</a>
        <h1>Broadcast send</h1>
      </header>
      <section class="controls">
        <label class="file-picker">
          <span>Pick a file</span>
          <input type="file" id="payload-input" accept="*/*" />
        </label>
        <button id="stream-button" disabled>Start broadcast</button>
        <span id="status" class="status">idle — pick any file to start</span>
      </section>
      <section class="output">
        <pre id="session-info"></pre>
      </section>
      <section class="stage">
        <canvas id="frame-canvas"></canvas>
      </section>
    </main>
    <script type="module" src="/src/pages/broadcast-send.ts"></script>
  </body>
</html>
